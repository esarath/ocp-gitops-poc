name: CI - Build and Push

on:
  push:
    branches: [main]
    paths:
      - 'sample-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'sample-app/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: esarath/sample-app

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sample-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r src/requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Run tests
        run: |
          cd src && python -m pytest ../tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: sample-app
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=${SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: sample-app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  update-manifests:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha_tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Update staging overlay
        run: |
          cd apps/sample-app/overlays/staging
          sed -i "s|value: \".*\"|value: \"${{ steps.tag.outputs.sha_tag }}\"|" kustomization.yaml

      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/sample-app/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m "ci: update staging image tag to ${{ steps.tag.outputs.sha_tag }}"
          git push
