apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: ghcr.io/esarath/sample-app:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: sample-app-config
                  key: APP_VERSION
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: sample-app-config
                  key: APP_ENV
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
