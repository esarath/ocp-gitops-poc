apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: sample-app-production
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: sample-app
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: ConfigMap
      name: sample-app-config
    patch: |-
      - op: replace
        path: /data/APP_ENV
        value: production
      - op: replace
        path: /data/APP_VERSION
        value: "1.0.0"
